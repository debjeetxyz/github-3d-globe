<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cosmic 3D GitHub Contribution Sphere</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="ui-overlay">
        <h2>@debjeetxyz</h2>
        <p>Joining Date: <strong>July 9</strong></p>
        <p id="live-stats">Public Repos: Loading... | Followers: Loading...</p>
        <p id="status-text">Fetching contributions...</p>
    </div>

    <div id="tooltip"></div>

    <!-- Interactive Commit Modal Template -->
    <div id="commit-modal">
        <button id="close-modal">&times;</button>
        <h3 id="modal-date-title">Commits on Date</h3>
        <div id="modal-commit-list">Loading live activity...</div>
    </div>

    <!-- Three.js Library CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <!-- Main Application Logic Script -->
    <script src="app.js"></script>
</body>
</html>
